<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Melodify | Music Player with Album Images</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Inter', system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(145deg, #0a0c12 0%, #141824 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* Main Player Card */
    .player-container {
      max-width: 560px;
      width: 100%;
      background: rgba(18, 25, 35, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .player-inner {
      padding: 1.8rem 1.8rem 2rem;
    }

    /* now playing section with REAL IMAGE */
    .now-playing-section {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    
    /* album art image - square, beautiful, with shadow */
    .album-art-img {
      width: 170px;
      height: 170px;
      border-radius: 24px;
      margin: 0 auto 0.9rem auto;
      object-fit: cover;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.45), 0 0 0 2px rgba(255,255,240,0.1);
      display: block;
      transition: transform 0.25s ease, box-shadow 0.2s;
      background: #1e2a32;
    }
    .album-art-img:hover {
      transform: scale(1.01);
      box-shadow: 0 22px 35px rgba(0, 0, 0, 0.5);
    }
    
    .now-label {
      font-size: 0.75rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 600;
      color: #bdd4ff;
      background: rgba(255,255,255,0.06);
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }
    .song-title {
      font-size: 1.7rem;
      font-weight: 800;
      margin-top: 0.6rem;
      color: #f2f6fe;
      letter-spacing: -0.3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 4px;
    }
    .artist-name {
      font-size: 1rem;
      font-weight: 500;
      color: #a9c0ea;
      margin-top: 0.2rem;
      opacity: 0.9;
    }

    /* progress bar */
    .progress-area {
      margin: 1.4rem 0 1rem;
    }
    .time-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 500;
      color: #bbd1fd;
      margin-bottom: 0.45rem;
    }
    .progress-bar-bg {
      background: #2e3f4b;
      border-radius: 40px;
      height: 6px;
      width: 100%;
      cursor: pointer;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #7b9eff, #c28aff);
      width: 0%;
      height: 100%;
      border-radius: 40px;
      transition: width 0.05s linear;
    }

    /* controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
      margin: 1.2rem 0 1.2rem;
    }
    .ctrl-btn {
      background: rgba(230, 240, 255, 0.08);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      color: #ecf3ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(6px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    }
    .ctrl-btn:hover {
      background: rgba(100, 150, 255, 0.55);
      transform: scale(1.04);
    }
    .ctrl-btn:active {
      transform: scale(0.96);
    }
    .play-pause {
      background: #4f7df3;
      width: 58px;
      height: 58px;
      font-size: 1.8rem;
      box-shadow: 0 8px 20px rgba(79, 125, 243, 0.35);
    }
    .play-pause:hover {
      background: #6c94ff;
    }

    /* volume */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(0, 0, 0, 0.35);
      padding: 0.45rem 1rem;
      border-radius: 60px;
      margin-bottom: 1.6rem;
    }
    .volume-icon {
      font-size: 1.2rem;
      color: #bfd6ff;
    }
    .volume-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: #374956;
      border-radius: 4px;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #c28aff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 4px #fff;
    }

    /* playlist & bonus */
    .playlist-section {
      margin-top: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1rem;
    }
    .playlist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #cbe1ff;
      letter-spacing: 0.6px;
    }
    .autoplay-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.35);
      padding: 4px 12px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.1s;
    }
    .autoplay-toggle span {
      font-size: 0.7rem;
      font-weight: 500;
    }
    .toggle-indicator {
      width: 32px;
      height: 16px;
      background: #3e5568;
      border-radius: 30px;
      display: inline-block;
      position: relative;
    }
    .toggle-indicator::after {
      content: "";
      width: 12px;
      height: 12px;
      background: #f0f4ff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 3px;
      transition: 0.2s;
    }
    .autoplay-active .toggle-indicator {
      background: #4f7df3;
    }
    .autoplay-active .toggle-indicator::after {
      left: 17px;
    }
    .playlist-items {
      max-height: 200px;
      overflow-y: auto;
      padding-right: 5px;
    }
    .playlist-items::-webkit-scrollbar {
      width: 4px;
    }
    .playlist-items::-webkit-scrollbar-track {
      background: #1f2f3a;
      border-radius: 4px;
    }
    .playlist-items::-webkit-scrollbar-thumb {
      background: #7b9eff;
      border-radius: 4px;
    }
    .playlist-track {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      padding: 0.65rem 0.9rem;
      border-radius: 1rem;
      margin-bottom: 7px;
      cursor: pointer;
      transition: 0.1s;
      border: 1px solid transparent;
    }
    .playlist-track:hover {
      background: rgba(79, 125, 243, 0.2);
      border-color: rgba(255,255,255,0.2);
    }
    .playlist-track.active-track {
      background: rgba(79, 125, 243, 0.35);
      border-left: 3px solid #8aacff;
    }
    .track-info {
      overflow: hidden;
    }
    .track-title {
      font-weight: 600;
      font-size: 0.85rem;
      color: #edf3ff;
    }
    .track-artist {
      font-size: 0.68rem;
      color: #adc2f0;
    }
    .track-duration {
      font-size: 0.7rem;
      font-family: monospace;
      background: #1f2c36;
      padding: 2px 8px;
      border-radius: 30px;
      color: #cbdffc;
    }
    .note-message {
      text-align: center;
      font-size: 0.68rem;
      opacity: 0.6;
      margin-top: 12px;
      color: #b4caf5;
    }
  </style>
</head>
<body>

<div class="player-container">
  <div class="player-inner">
    <!-- Now playing area with DYNAMIC IMAGE (real album art) -->
    <div class="now-playing-section">
      <img id="albumArtImage" class="album-art-img" src="https://picsum.photos/id/104/200/200" alt="cover">
      <div class="now-label">🎧 NOW PLAYING</div>
      <div class="song-title" id="currentSongTitle">Echoes of Us</div>
      <div class="artist-name" id="currentArtistName">Nightdrive</div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-area">
      <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="totalDuration">0:00</span>
      </div>
      <div class="progress-bar-bg" id="progressBarBg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Main Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" aria-label="Previous">⏮</button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" aria-label="Play/Pause">▶</button>
      <button class="ctrl-btn" id="nextBtn" aria-label="Next">⏭</button>
    </div>

    <!-- Volume Control -->
    <div class="volume-container">
      <span class="volume-icon">🔊</span>
      <input type="range" id="volumeControl" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
    </div>

    <!-- Playlist + Autoplay (Bonus) -->
    <div class="playlist-section">
      <div class="playlist-header">
        <span>📋 PLAYLIST · 5 TRACKS</span>
        <div id="autoplayToggle" class="autoplay-toggle">
          <span>🔁 Autoplay</span>
          <div class="toggle-indicator"></div>
        </div>
      </div>
      <div class="playlist-items" id="playlistContainer"></div>
      <div class="note-message">✨ Click any track · autoplay loops playlist ✨</div>
    </div>
  </div>
</div>

<script>
  // ---------- SONG DATABASE WITH HIGH-QUALITY IMAGES (UNIQUE ALBUM ART) ----------
  const songs = [
    { 
      title: "Pal Pal", 
      artist: "Afusic, Ali Soomro", 
      src: "Songs/Song 1.mp3", 
      duration: "2:46",
      coverArt: "Images/song1.jpg"   // peaceful nature / lake
    },
    { 
      title: "Aitbar Dendi Han", 
      artist: "S. Qadeer", 
      src: "Songs/Song 2.mp3", 
      duration: "3:52",
      coverArt: "Images/song2.jpg"    // artistic bridge
    },
    { 
      title: "Haseen", 
      artist: "Talha Anjum", 
      src: "Songs/Song 3.mp3", 
      duration: "3:48",
      coverArt: "Images/song3.jpg"   // vibrant flower
    },
    { 
      title: "Ishaq'n De Lekha", 
      artist: "Sajjan Adeeb", 
      src: "Songs/Song 4.mp3", 
      duration: "3:30",
      coverArt: "Images/song4.jpg"    // riverside trees
    },
    { 
      title: "Tere Layi", 
      artist: "Nirvair Pannu", 
      src: "Songs/Song 5.mp3", 
      duration: "6:40",
      coverArt: "Images/song5.jpg"   // urban night
    }
  ];

  // ----- DOM References -----
  const audio = new Audio();
  const playPauseBtn = document.getElementById('playPauseBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progressBarBg = document.getElementById('progressBarBg');
  const progressFill = document.getElementById('progressFill');
  const currentTimeSpan = document.getElementById('currentTime');
  const totalDurationSpan = document.getElementById('totalDuration');
  const volumeSlider = document.getElementById('volumeControl');
  const currentSongTitleEl = document.getElementById('currentSongTitle');
  const currentArtistNameEl = document.getElementById('currentArtistName');
  const playlistContainer = document.getElementById('playlistContainer');
  const autoplayToggleDiv = document.getElementById('autoplayToggle');
  const albumArtImage = document.getElementById('albumArtImage');   // THE IMAGE ELEMENT

  // ----- State -----
  let currentTrackIndex = 0;
  let isPlaying = false;
  let autoplayEnabled = true;
  let isDraggingProgress = false;

  // Helper: format seconds to MM:SS
  function formatTime(seconds) {
    if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }

  // update duration display when metadata is loaded
  function updateDurationDisplay() {
    if (audio.duration && isFinite(audio.duration)) {
      totalDurationSpan.innerText = formatTime(audio.duration);
    } else {
      totalDurationSpan.innerText = songs[currentTrackIndex].duration || "0:00";
    }
  }

  // CHANGE ALBUM ART IMAGE based on selected track
  function updateAlbumArtImage(index) {
    const track = songs[index];
    if (track && track.coverArt) {
      albumArtImage.src = track.coverArt;
      albumArtImage.alt = `${track.title} cover`;
    } else {
      // fallback image if missing
      albumArtImage.src = "https://picsum.photos/id/104/300/300";
    }
  }

  // load track: update audio source, text, and album art image
  function loadTrack(index) {
    const track = songs[index];
    if (!track) return;
    audio.src = track.src;
    audio.load();
    currentSongTitleEl.innerText = track.title;
    currentArtistNameEl.innerText = track.artist;
    // update the album art image dynamically!
    updateAlbumArtImage(index);
    totalDurationSpan.innerText = track.duration || "0:00";
    currentTimeSpan.innerText = "0:00";
    progressFill.style.width = "0%";
    if (isPlaying) {
      audio.play().catch(e => console.log("play after load need interaction"));
    }
    highlightActivePlaylistItem();
  }

  // highlight current song in playlist sidebar
  function highlightActivePlaylistItem() {
    const allItems = document.querySelectorAll('.playlist-track');
    allItems.forEach((item, idx) => {
      if (idx === currentTrackIndex) {
        item.classList.add('active-track');
      } else {
        item.classList.remove('active-track');
      }
    });
  }

  function updatePlayButtonUI() {
    playPauseBtn.innerText = isPlaying ? '⏸' : '▶';
  }

  function togglePlayPause() {
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
    } else {
      audio.play().then(() => {
        isPlaying = true;
        updatePlayButtonUI();
      }).catch(err => {
        console.warn("Playback blocked until user interaction:", err);
        isPlaying = false;
        updatePlayButtonUI();
      });
    }
    updatePlayButtonUI();
  }

  function nextTrack() {
    let nextIdx = currentTrackIndex + 1;
    if (nextIdx >= songs.length) {
      if (autoplayEnabled) {
        nextIdx = 0;   // loop to first
      } else {
        if (isPlaying) {
          audio.pause();
          isPlaying = false;
          updatePlayButtonUI();
        }
        return;
      }
    }
    changeTrack(nextIdx);
    if (isPlaying) {
      audio.play().catch(e => console.log("autoplay next"));
    }
  }

  function prevTrack() {
    let prevIdx = currentTrackIndex - 1;
    if (prevIdx < 0) prevIdx = songs.length - 1;
    changeTrack(prevIdx);
    if (isPlaying) {
      audio.play().catch(e => console.log("play prev"));
    }
  }

  function changeTrack(newIndex) {
    if (newIndex === currentTrackIndex) return;
    currentTrackIndex = newIndex;
    loadTrack(currentTrackIndex);
    if (isPlaying) {
      audio.play().catch(e => console.log("resume after change"));
    }
  }

  // update progress bar & currentTime display
  function updateProgress() {
    if (!isDraggingProgress && audio.duration && isFinite(audio.duration)) {
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percent}%`;
      currentTimeSpan.innerText = formatTime(audio.currentTime);
    } else if (!isDraggingProgress && audio.duration) {
      currentTimeSpan.innerText = formatTime(audio.currentTime);
    }
  }

  function seekTo(e) {
    const rect = progressBarBg.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const width = rect.width;
    if (width > 0 && audio.duration && isFinite(audio.duration)) {
      const seekTime = (clickX / width) * audio.duration;
      audio.currentTime = seekTime;
      updateProgress();
    }
  }

  function setVolume(value) {
    audio.volume = parseFloat(value);
  }

  // build playlist with dynamic data
  function buildPlaylist() {
    playlistContainer.innerHTML = '';
    songs.forEach((song, idx) => {
      const trackDiv = document.createElement('div');
      trackDiv.classList.add('playlist-track');
      if (idx === currentTrackIndex) trackDiv.classList.add('active-track');
      trackDiv.innerHTML = `
        <div class="track-info">
          <div class="track-title">${escapeHtml(song.title)}</div>
          <div class="track-artist">${escapeHtml(song.artist)}</div>
        </div>
        <div class="track-duration">${song.duration}</div>
      `;
      trackDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentTrackIndex === idx && isPlaying) {
          // do nothing, already playing the track
        } else {
          changeTrack(idx);
          if (!isPlaying) {
            audio.play().then(() => {
              isPlaying = true;
              updatePlayButtonUI();
            }).catch(() => {
              isPlaying = false;
              updatePlayButtonUI();
            });
          }
        }
      });
      playlistContainer.appendChild(trackDiv);
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // toggle autoplay bonus feature
  function toggleAutoplay() {
    autoplayEnabled = !autoplayEnabled;
    if (autoplayEnabled) {
      autoplayToggleDiv.classList.add('autoplay-active');
    } else {
      autoplayToggleDiv.classList.remove('autoplay-active');
    }
  }

  // When song ends -> autoplay next if enabled else stop
  function onSongEnd() {
    if (autoplayEnabled) {
      let nextIdx = currentTrackIndex + 1;
      if (nextIdx >= songs.length) {
        nextIdx = 0;
      }
      changeTrack(nextIdx);
      if (isPlaying) {
        audio.play().catch(e => console.log("autoplay after end"));
      } else {
        // Edge: if was playing, reinitiate
        audio.play().then(() => {
          isPlaying = true;
          updatePlayButtonUI();
        }).catch(() => {});
      }
    } else {
      // autoplay off: stop playback and reset UI playing state
      isPlaying = false;
      updatePlayButtonUI();
      currentTimeSpan.innerText = formatTime(audio.duration || 0);
    }
  }

  function bindAudioEvents() {
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('loadedmetadata', () => {
      updateDurationDisplay();
      if (isPlaying) {
        audio.play().catch(e=>console.log("meta play"));
      }
    });
    audio.addEventListener('ended', onSongEnd);
    audio.addEventListener('canplay', () => {
      updateDurationDisplay();
    });
    audio.addEventListener('play', () => {
      isPlaying = true;
      updatePlayButtonUI();
    });
    audio.addEventListener('pause', () => {
      isPlaying = false;
      updatePlayButtonUI();
    });
    audio.addEventListener('error', (e) => {
      console.warn("Audio loading error", e);
    });
  }

  // ----- INITIALIZATION -----
  function init() {
    buildPlaylist();
    currentTrackIndex = 0;
    loadTrack(0);
    audio.volume = 0.7;
    volumeSlider.value = "0.7";
    isPlaying = false;
    updatePlayButtonUI();
    bindAudioEvents();
    if (autoplayEnabled) autoplayToggleDiv.classList.add('autoplay-active');
    else autoplayToggleDiv.classList.remove('autoplay-active');
    
    // Event listeners
    playPauseBtn.addEventListener('click', togglePlayPause);
    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);
    progressBarBg.addEventListener('click', seekTo);
    volumeSlider.addEventListener('input', (e) => setVolume(e.target.value));
    
    // dragging progress for smooth seek
    progressBarBg.addEventListener('mousedown', (e) => {
      isDraggingProgress = true;
      seekTo(e);
      document.addEventListener('mousemove', onMouseMoveSeek);
      document.addEventListener('mouseup', onMouseUpSeek);
    });
    
    function onMouseMoveSeek(e) {
      if (isDraggingProgress) {
        seekTo(e);
      }
    }
    function onMouseUpSeek() {
      isDraggingProgress = false;
      document.removeEventListener('mousemove', onMouseMoveSeek);
      document.removeEventListener('mouseup', onMouseUpSeek);
    }
    
    autoplayToggleDiv.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleAutoplay();
    });
    
    setVolume(0.7);
  }
  
  init();
</script>
</body>
</html>
