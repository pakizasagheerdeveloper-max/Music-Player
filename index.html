<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Melodify | Music Player with Album Images</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="player-container">
  <div class="player-inner">
    <!-- Now playing area with DYNAMIC IMAGE (real album art) -->
    <div class="now-playing-section">
      <img id="albumArtImage" class="album-art-img" src="https://picsum.photos/id/104/200/200" alt="cover">
      <div class="now-label">🎧 NOW PLAYING</div>
      <div class="song-title" id="currentSongTitle">Echoes of Us</div>
      <div class="artist-name" id="currentArtistName">Nightdrive</div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-area">
      <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="totalDuration">0:00</span>
      </div>
      <div class="progress-bar-bg" id="progressBarBg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Main Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" aria-label="Previous">⏮</button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" aria-label="Play/Pause">▶</button>
      <button class="ctrl-btn" id="nextBtn" aria-label="Next">⏭</button>
    </div>

    <!-- Volume Control -->
    <div class="volume-container">
      <span class="volume-icon">🔊</span>
      <input type="range" id="volumeControl" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
    </div>

    <!-- Playlist + Autoplay (Bonus) -->
    <div class="playlist-section">
      <div class="playlist-header">
        <span>📋 PLAYLIST · 5 TRACKS</span>
        <div id="autoplayToggle" class="autoplay-toggle">
          <span>🔁 Autoplay</span>
          <div class="toggle-indicator"></div>
        </div>
      </div>
      <div class="playlist-items" id="playlistContainer"></div>
      <div class="note-message">✨ Click any track · autoplay loops playlist ✨</div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
